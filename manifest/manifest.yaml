# openclaw-pipeline-bench manifest
# Single source of truth for workload parameters across all variants.
# Edit here, re-run `make bench-all` — every variant reads this file.

bench:
  name: openclaw-pipeline-bench
  version: 0.1.0
  rfc: openclaw/rfcs#11

hardware:
  target: Mac mini M5 Pro
  os: macOS 15.x (darwin)
  arch: arm64
  container_runtime: orbstack  # preferred over docker desktop for ARM perf

workload:
  agents: 10                    # "top-10 claws" — 10 concurrent synthetic agents
  events_per_agent_per_sec: 10  # 100 ms cadence per agent (default = micro)
  total_events_per_sec: 100     # = agents * events_per_agent_per_sec
  event_payload_bytes: 512      # default = micro (overridden per size class)
  read_back_window: 5           # each agent re-reads last 5 of its own events
  warmup_seconds: 60
  steady_state_seconds: 300

# Payload size matrix. The harness can override --payload-bytes and --eps-per-agent
# at the CLI; this section documents the three classes the run-all script iterates.
# Eps is scaled with size so total bandwidth stays in the 50 KB/s – 200 MB/s band,
# keeping substrate cost (not memory/disk bandwidth) as the measurand.
size_classes:
  - id: micro
    description: Chat-message-sized agent log lines, function-call results
    payload_bytes: 512                # 0.5 KB
    eps_per_agent: 10                 # 100 eps total -> ~50 KB/s
    warmup_seconds: 30
    steady_state_seconds: 60

  - id: macro
    description: RAG-retrieved chunks, large model responses, document-sized blobs
    payload_bytes: 5242880            # 5 MB
    eps_per_agent: 1                  # 10 eps total -> ~50 MB/s
    warmup_seconds: 30
    steady_state_seconds: 60

  - id: super-macro
    description: Multimodal assets (video frames, audio files), dataset shards
    payload_bytes: 104857600          # 100 MB
    eps_per_agent: 0.2                # 2 eps total -> ~200 MB/s
    warmup_seconds: 30
    steady_state_seconds: 60

substrate:
  sqlite:
    pragmas:
      journal_mode: WAL
      synchronous: NORMAL
      temp_store: MEMORY
      cache_size: -64000        # 64 MiB page cache
  file_share:
    fs: tmpfs                   # eliminates disk variance for baseline
    path: /workspace
    layout: per-agent-jsonl     # /workspace/agent-{n}.jsonl

variants:
  - id: baseline
    description: File-share substrate, no pipeline, no analysts (today's shape)
    substrate: file_share
    pipeline_stages: []
    analysts: []

  - id: sqlite-flat
    description: Single SQLite database + single table, no pipeline, no analysts (isolates SQLite-engine cost from pipeline-shape cost)
    substrate: sqlite_flat
    pipeline_stages: []
    analysts: []

  - id: pipeline-noop
    description: Three-stage pipeline (raw/processed/curated) on SQLite, no analyst skills, lower-bound promotion (INSERT-only, no SELECT/DELETE from source)
    substrate: sqlite
    pipeline_stages: [raw, processed, curated]
    analysts: []

  - id: pipeline-fullcopy
    description: Three-stage pipeline with faithful SELECT+INSERT+DELETE promotion per seam, no analysts (upper-bound pipeline cost)
    substrate: sqlite_fullcopy
    pipeline_stages: [raw, processed, curated]
    analysts: []

  - id: pipeline-1-analyst
    description: Three-stage pipeline + one synthetic analyst per stage boundary, all pass
    substrate: sqlite
    pipeline_stages: [raw, processed, curated]
    analysts:
      - seam: raw_to_processed
        verdict: pass
        cost_ms: 1
      - seam: processed_to_curated
        verdict: pass
        cost_ms: 1

  - id: pipeline-blocking
    description: Three-stage pipeline + analyst that blocks 5% of payloads at processed→curated
    substrate: sqlite
    pipeline_stages: [raw, processed, curated]
    analysts:
      - seam: raw_to_processed
        verdict: pass
        cost_ms: 1
      - seam: processed_to_curated
        verdict: conditional_block
        block_rate: 0.05
        cost_ms: 1

metrics:
  latency_percentiles: [50, 95, 99]
  rss_sample_hz: 1
  runs_per_variant: 3            # report median + min/max
  cold_start_runs_per_variant: 2 # discard first-touch, report second

reporting:
  results_dir: bench/results
  report_template: scripts/report.md.j2
  headline_required: true        # human writes 1-paragraph summary post-run
